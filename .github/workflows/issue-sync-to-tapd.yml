name: GitHub Issue 自动同步到 TAPD

on:
  issues:
    types:
      - opened
      - assigned
      - reopened

jobs:
  sync-to-tapd:
    runs-on: ubuntu-latest

    steps:
      # 步骤1：检查 assignee 是否存在，并且是否为指定负责人
      - name: 检查 Issue 责任人
        run: |
          ASSIGNEE="${{ github.event.issue.assignee.login }}"

          if [ -z "$ASSIGNEE" ]; then
            echo "Issue 没有负责人，跳过同步"
            echo "SHOULD_SKIP=true" >> $GITHUB_ENV
            exit 0
          fi

          if [ "$ASSIGNEE" != "luty2018" ]; then
            echo "Issue 未分配给 luty2018，跳过同步"
            echo "SHOULD_SKIP=true" >> $GITHUB_ENV
            exit 0
          fi

          echo "Issue 已分配给 luty2018，准备同步"
          echo "SHOULD_SKIP=false" >> $GITHUB_ENV

      # 步骤2：同步到 TAPD（修复 GitHub Actions 表达式语法）
      - name: 同步到 TAPD
        if: env.SHOULD_SKIP == 'false'
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          ISSUE_BODY: ${{ github.event.issue.body }}

          TAPD_WORKSPACE_ID: ${{ secrets.TAPD_WORKSPACE_ID }}
          TAPD_PROJECT_ID: ${{ secrets.TAPD_PROJECT_ID }}
          TAPD_ITERATION_ID: ${{ secrets.TAPD_ITERATION_ID }}
          TAPD_API_USERNAME: ${{ secrets.TAPD_API_USERNAME }}
          TAPD_API_PASSWORD: ${{ secrets.TAPD_API_PASSWORD }}

        run: |
          # body 为空时手动兜底（不能在 GitHub 表达式里直接写 "无描述"）
          if [ -z "$ISSUE_BODY" ]; then
            ISSUE_BODY="无描述"
          fi

          echo "开始同步 GitHub Issue 到 TAPD..."

          curl --fail -X POST "https://api.tapd.cn/stories?workspace_id=${TAPD_WORKSPACE_ID}" \
            -H "Content-Type: application/json" \
            -u "${TAPD_API_USERNAME}:${TAPD_API_PASSWORD}" \
            -d "$(cat <<EOF
          {
            "story": {
              "title": "[GitHub Issue] ${ISSUE_TITLE}",
              "description": "GitHub链接：${ISSUE_URL}\n\n描述：${ISSUE_BODY}",
              "project_id": "${TAPD_PROJECT_ID}",
              "workspace_id": "${TAPD_WORKSPACE_ID}",
              "iteration_id": "${TAPD_ITERATION_ID}",
              "status": "未处理",
              "created_by": "${TAPD_API_USERNAME}",
              "assigned_to": "${TAPD_API_USERNAME}"
            }
          }
          EOF
          )"

          echo "同步完成"