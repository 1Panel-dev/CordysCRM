name: GitHub Issue 自动同步到 TAPD

on:
  issues:
    types:
      - opened
      - assigned
      - reopened

# 需要写权限来添加标签
permissions:
  issues: write

jobs:
  sync-to-tapd:
    runs-on: ubuntu-latest
    steps:
      - name: 检查是否需要同步（责任人 + 标签）
        id: check
        run: |
          ASSIGNEE="${{ github.event.issue.assignee.login }}"
          # 获取当前 Issue 所有标签名（空数组表示无标签）
          LABELS='${{ toJSON(github.event.issue.labels.*.name) }}'

          if [ -z "$ASSIGNEE" ] || [ "$ASSIGNEE" != "luty2018" ]; then
            echo "Issue 未分配给 luty2018 或无负责人，跳过同步"
            echo "should_sync=false" >> $GITHUB_OUTPUT
          elif echo "$LABELS" | jq -e 'index("tapd-synced")' > /dev/null; then
            echo "Issue 已带有 tapd-synced 标签，已经同步过，跳过"
            echo "should_sync=false" >> $GITHUB_OUTPUT
          else
            echo "Issue 已分配给 luty2018 且未同步，准备同步"
            echo "should_sync=true" >> $GITHUB_OUTPUT
          fi

      - name: 同步到 TAPD
        if: steps.check.outputs.should_sync == 'true'
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          TAPD_WORKSPACE_ID: ${{ secrets.TAPD_WORKSPACE_ID }}
          TAPD_PROJECT_ID: ${{ secrets.TAPD_PROJECT_ID }}
          TAPD_ITERATION_ID: ${{ secrets.TAPD_ITERATION_ID }}
          TAPD_API_USERNAME: ${{ secrets.TAPD_API_USERNAME }}
          TAPD_API_PASSWORD: ${{ secrets.TAPD_API_PASSWORD }}
          TAPD_API_OWNER: ${{ secrets.TAPD_API_OWNER }}
        run: |
          # 空描述兜底
          BODY="${ISSUE_BODY:-无描述}"
          TITLE="[GitHub Issue] ${ISSUE_TITLE}"

          # 把正文里的换行都换成 <br>，再组装最终描述
          BODY_HTML="${BODY//$'\n'/<br>}"
          DESCRIPTION="GitHub链接：${ISSUE_URL}<br><br>描述：${BODY_HTML}"

          # 用 jq 安全生成 JSON（自动处理引号等特殊字符）
          JSON=$(jq -n \
            --arg name "$TITLE" \
            --arg desc "$DESCRIPTION" \
            --arg proj "$TAPD_PROJECT_ID" \
            --arg ws "$TAPD_WORKSPACE_ID" \
            --arg iteration "$TAPD_ITERATION_ID" \
            --arg user "$TAPD_API_USERNAME" \
            --arg owner "$TAPD_API_OWNER" \
            '{
              name: $name,
              description: $desc,
              project_id: $proj,
              workspace_id: $ws,
              owner: $owner,
              creator: $owner
            } + if $iteration != "" then {iteration_id: $iteration} else {} end')

          echo "正在创建 TAPD 需求..."
          echo "标题: $TITLE"
          echo "描述: $DESCRIPTION"

          # 发送请求并检查状态码
          HTTP_CODE=$(curl -s -o /dev/stderr -w "%{http_code}" -X POST \
            "https://api.tapd.cn/stories?workspace_id=${TAPD_WORKSPACE_ID}" \
            -H "Content-Type: application/json" \
            -u "${TAPD_API_USERNAME}:${TAPD_API_PASSWORD}" \
            -d "$JSON")

          if [ "$HTTP_CODE" -ne 200 ] && [ "$HTTP_CODE" -ne 201 ]; then
            echo "::error::TAPD API 返回 HTTP ${HTTP_CODE}，请查看上方响应详情"
            exit 1
          fi

          echo "✅ 同步完成，TAPD 需求已创建"

      - name: 添加已同步标签
        if: steps.check.outputs.should_sync == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['tapd-synced']
            })