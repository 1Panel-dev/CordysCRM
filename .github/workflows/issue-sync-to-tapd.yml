name: GitHub Issue 自动同步到 TAPD
on:
  issues:
    types: [opened, assigned]

jobs:
  sync-to-tapd:
    runs-on: ubuntu-latest
    steps:
      - name: 同步 Issue 到 TAPD
        uses: actions-cool/sync-github-to-tapd@v2
        with:
          tapd-workspace-id: ${{ secrets.TAPD_WORKSPACE_ID }}
          tapd-project-id: ${{ secrets.TAPD_PROJECT_ID }}
          tapd-username: ${{ secrets.TAPD_API_USERNAME }}
          tapd-token: ${{ secrets.TAPD_API_PASSWORD }}
          tapd-iteration-id: ${{ secrets.TAPD_ITERATION_ID }}
          filter-assignee: "luty2018"
